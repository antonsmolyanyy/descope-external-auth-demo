services:
  - type: web
    name: demo-external-auth-mcp
    runtime: python
    plan: free
    buildCommand: uv sync --frozen
    startCommand: uv run uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: DESCOPE_CONFIG_URL
        sync: false
